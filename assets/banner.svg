        <svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <pattern id="ledger" width="48" height="48" patternUnits="userSpaceOnUse">
              <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#D7CCBD" stroke-width="1" />
            </pattern>
            <clipPath id="frame-clip">
              <rect width="1200" height="360" rx="28" />
            </clipPath>
            <style><![CDATA[
              .badge { font-family: "JetBrainsMono Nerd Font", "Hack Nerd Font", "CaskaydiaMono Nerd Font", "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", monospace; font-size: 13px; font-weight: 700; fill: #20303D; }
              .eyebrow { font-family: "JetBrainsMono Nerd Font", "Hack Nerd Font", "CaskaydiaMono Nerd Font", "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", monospace; font-size: 15px; font-weight: 700; letter-spacing: 0.14em; fill: #C46B38; }
              .title { font-family: "JetBrainsMono Nerd Font", "Hack Nerd Font", "CaskaydiaMono Nerd Font", "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", monospace; font-size: 38px; font-weight: 700; fill: #FFF9F0; }
              .subtitle { font-family: "JetBrainsMono Nerd Font", "Hack Nerd Font", "CaskaydiaMono Nerd Font", "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", monospace; font-size: 17px; font-weight: 700; fill: #D9D0C4; }
              .footer { font-family: "JetBrainsMono Nerd Font", "Hack Nerd Font", "CaskaydiaMono Nerd Font", "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", monospace; font-size: 13px; font-weight: 700; fill: #20303D; }
              .panel-label { font-family: "JetBrainsMono Nerd Font", "Hack Nerd Font", "CaskaydiaMono Nerd Font", "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", monospace; font-size: 12px; font-weight: 700; letter-spacing: 0.1em; fill: #C46B38; }
              .panel-title { font-family: "JetBrainsMono Nerd Font", "Hack Nerd Font", "CaskaydiaMono Nerd Font", "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", monospace; font-size: 16px; font-weight: 700; fill: #20303D; }
              .panel-copy { font-family: "JetBrainsMono Nerd Font", "Hack Nerd Font", "CaskaydiaMono Nerd Font", "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", monospace; font-size: 14px; fill: #20303D; }
              .panel-copy-muted { font-family: "JetBrainsMono Nerd Font", "Hack Nerd Font", "CaskaydiaMono Nerd Font", "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", monospace; font-size: 13px; fill: #314252; }
            ]]></style>
          </defs>

          <g clip-path="url(#frame-clip)">
            <rect width="1200" height="360" rx="28" fill="#F4F1EA" />
            <rect width="1200" height="360" rx="28" fill="url(#ledger)" opacity="0.72" />
            <rect x="0" y="298" width="1200" height="62" fill="#FCFAF6" />

            <rect x="50" y="38" width="724" height="258" rx="22" fill="#C2B29D" />
<rect x="42" y="30" width="724" height="258" rx="22" fill="#101721" stroke="#2E3D49" stroke-width="2" />
            <rect x="70" y="58" width="250" height="32" rx="9" fill="#F4F1EA" />
            <text x="90" y="79" class="badge">&gt; agentic-control</text>
            <rect x="70" y="112" width="28" height="3" rx="1.5" fill="#C46B38" />
            <text x="114" y="120" class="eyebrow">RUNTIME EVENT STANDARDISATION</text>
            <text x="70" y="164" class="title">Agentic Control</text>
            <text x="70" y="208" class="subtitle">portable hook and plugin adapters</text>
            <text x="70" y="236" class="subtitle">one normalised event contract</text>
            <text x="70" y="264" class="subtitle">app-owned bindings through one installer</text>

            <rect x="802" y="50" width="330" height="140" rx="18" fill="#C2B29D" />
<rect x="796" y="44" width="330" height="140" rx="18" fill="#FCFAF6" stroke="#D7CCBD" stroke-width="2" />
            <text x="824" y="78" class="panel-label">[ runtimes ]</text>
            <text x="824" y="104" class="panel-title">current adapters</text>
            <text x="824" y="136" class="panel-copy">codex  gemini  claude  opencode</text>
            <text x="824" y="158" class="panel-copy-muted">hooks where available</text>
            <text x="824" y="176" class="panel-copy-muted">plugins where they are native</text>

            <rect x="802" y="194" width="330" height="148" rx="18" fill="#C2B29D" />
<rect x="796" y="188" width="330" height="148" rx="18" fill="#FCFAF6" stroke="#D7CCBD" stroke-width="2" />
            <text x="824" y="220" class="panel-label">[ contract ]</text>
            <text x="824" y="246" class="panel-title">core fields</text>
            <text x="824" y="276" class="panel-copy">runtime  session  tool</text>
            <text x="824" y="300" class="panel-copy">bindings  socket  debug</text>
            <text x="824" y="322" class="panel-copy-muted">product logic stays in your app</text>

            <rect x="786" y="60" width="10" height="216" rx="5" fill="#B48B34" />
            <rect x="1156" y="62" width="16" height="16" rx="3" fill="#2E7074" />
            <rect x="1156" y="88" width="16" height="16" rx="3" fill="#C46B38" />
            <rect x="1156" y="114" width="16" height="16" rx="3" fill="#4C6F94" />

            <text x="70" y="334" class="footer">Hooks  •  Plugins  •  Unix sockets  •  Bindings  •  Portable adapters</text>
          </g>
        </svg>
